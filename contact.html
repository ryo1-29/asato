<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 安里整体院</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">安里整骨院</div>

      <nav class="pc-nav">
        <a href="index.html">ホーム</a>
        <a href="menu.html">施術メニュー</a>
        <a href="contact.html" class="active">お問い合わせ</a>
      </nav>

      <a href="reserve.html" class="reserve-btn">オンライン予約</a>
    </div>
  </header>

  <main class="contact-main">

    <section class="contact-section">
      <div class="container">
        <div class="contact-wrapper">

          <div class="contact-heading">
            <span class="label">お問い合わせ</span>
            <h1>お問い合わせ</h1>
            <p>
              お身体のお悩みや施術内容、ご予約についてなど、
              気になることがございましたらお気軽にご相談ください。
            </p>
          </div>

          <div class="form-card">
            <form action="#" method="post" class="contact-form">

              <div class="form-row">
                <div class="form-group">
                  <label for="name">お名前</label>
                  <input type="text" id="name" name="name" placeholder="山田太郎">
                </div>

                <div class="form-group">
                  <label for="email">メールアドレス</label>
                  <input type="email" id="email" name="email" placeholder="example@email.com">
                </div>
              </div>

              <div class="form-group">
                <label for="subject">お問い合わせ項目</label>
                <select id="subject" name="subject">
                  <option>一般のお問い合わせ</option>
                  <option>施術のご相談</option>
                  <option>ご予約について</option>
                  <option>その他</option>
                </select>
              </div>

              <div class="form-group">
                <label for="message">お問い合わせ内容</label>
                <textarea id="message" name="message" rows="6" placeholder="ご相談内容をご記入ください"></textarea>
              </div>

              <div class="submit-area">
                <button type="submit" class="submit-btn">
                  <span>メッセージを送信する</span>
                  <span class="material-symbols-outlined">send</span>
                </button>

                <p class="form-note">
                  送信ボタンを押すことで、当院のプライバシーポリシーに同意したものとみなされます。
                </p>
              </div>

            </form>
          </div>

        </div>
      </div>
    </section>

  </main>

  <!-- フッター -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-logo">安里整体院</div>

      <div class="footer-links">
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="terms.html">利用規約</a>
        <a href="access.html">アクセス</a>
      </div>

      <p>© 2025 Asato Seitai Clinic.</p>
    </div>
  </footer>

</body>
</html>
